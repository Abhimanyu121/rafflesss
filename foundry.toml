[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]
[rpc_endpoints]
base = "https://api.zan.top/base-mainnet"
base-sepolia = "https://sepolia.base.org"

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 1000 }

